# For dev environment, run docker compose up
# For production on pi, run docker compose --profile production up -d
services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: survivor_league
      MYSQL_USER: survivor_app
      MYSQL_PASSWORD: survivor_app
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "survivor_app", "-psurvivor_app"]
      interval: 10s
      timeout: 5s
      retries: 5

  flyway:
    image: flyway/flyway:11-alpine
    command: -url=jdbc:mysql://mysql:3306/survivor_league -user=survivor_app -password=survivor_app migrate
    volumes:
      - ./backend/src/main/resources/db/migration:/flyway/sql
    depends_on:
      mysql:
        condition: service_healthy

  backend:
    build: ./backend
    ports:
      - "8080:8080" # Remove this in production, only for testing
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/survivor_league
      SPRING_DATASOURCE_USERNAME: survivor_app
      SPRING_DATASOURCE_PASSWORD: survivor_app
      JAVA_TOOL_OPTIONS: "-Xms256m -Xmx512m"
    depends_on:
      mysql:
        condition: service_healthy
      flyway:
        condition: service_completed_successfully

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN}
    depends_on:
      - backend
    restart: unless-stopped
    profiles:
      - production

volumes:
  mysql_data:
