# For dev environment, run docker compose up
# For production on pi, run docker compose --profile production up -d
services:
  db:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: survivor_league
      MYSQL_USER: survivor_app
      MYSQL_PASSWORD: survivor_app
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/src/main/resources/db/migration/V1_init.sql:/docker-entrypoint-initdb.d/V1_init.sql
      - ./backend/src/main/resources/db/sample/sample_data.sql:/docker-entrypoint-initdb.d/V2_sample_data.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "survivor_app", "-psurvivor_app"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: ./backend
    ports:
      - "8080:8080" # Remove this in production, only for testing
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/survivor_league
      SPRING_DATASOURCE_USERNAME: survivor_app
      SPRING_DATASOURCE_PASSWORD: survivor_app
      JAVA_TOOL_OPTIONS: "-Xms256m -Xmx512m"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - app

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN}
    depends_on:
      - app
    restart: unless-stopped
    profiles:
      - production

volumes:
  mysql_data:
