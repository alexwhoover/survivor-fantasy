server {
    listen 80;
    root /usr/share/nginx/html;  # where `npm run build` output is copied in the Dockerfile
    index index.html;

    # Reverse proxy: forward all /api/* requests to the Spring Boot backend container.
    # The frontend and backend run in separate Docker containers, but are on the same
    # Docker network, so the backend is reachable by its service name ("app").
    # This means the browser only ever talks to one origin (port 80), avoiding CORS issues.
    location /api/ {
        # Use Docker's internal DNS resolver. Without this, nginx resolves "app" once at
        # startup — if the backend container isn't ready yet, nginx crashes. Setting a
        # resolver forces re-resolution on each request, which also requires the variable below.
        resolver 127.0.0.11 valid=30s;

        # Assigning the upstream to a variable is required to activate the runtime DNS
        # resolution configured above. A literal proxy_pass URL is resolved only at startup.
        set $backend http://backend:8080;

        # Forward the original request URI (e.g. /api/seasons?foo=bar) to the backend.
        # Using $request_uri is necessary because when proxy_pass contains a variable,
        # nginx does not rewrite the path — a literal path like /api/ would be sent to the
        # backend for every request instead of the actual path.
        proxy_pass $backend$request_uri;

        # Pass the original Host header and client IP to the backend so it can log
        # the real caller rather than seeing all requests come from the nginx container.
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Serve the React app for all other requests.
    # try_files checks for a real file/directory first (e.g. /assets/main.js),
    # then falls back to index.html so that client-side routes like /cast don't 404.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
