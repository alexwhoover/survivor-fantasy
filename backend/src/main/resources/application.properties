# Metadata
spring.application.name=Survivor Application

# Console Logging
spring.main.banner-mode=off
logging.level.root=ERROR

# Database Source and User Login
spring.datasource.url=jdbc:mysql://localhost:3306/survivor_league
spring.datasource.username=survivor_app
spring.datasource.password=survivor_app

# Base API Path and Page Size
spring.data.rest.base-path=/api
spring.data.rest.default-page-size=20

# Tell Spring Session to use JDBC Backend instead of default in-memory store. Persists between startups.
spring.session.store-type=jdbc

# Spring won't touch database schema. Instead using V12__create_spring_session_tables.sql.
spring.session.jdbc.initialize-schema=never

# Invite code required to register a new account (this is a closed, friends-only app)
app.invite-code=CirieGotRobbed

# Include the exception's message (e.g. "Invalid invite code") in error JSON bodies.
# Without this, Spring's default error body omits "message" entirely and the
# frontend has nothing readable to show but the generic {"error":"Forbidden",...} blob.
server.error.include-message=always
